services:
  - type: web
    name: taskpilot
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: onboarding@resend.dev
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: taskpilot-db
          property: connectionString
      - key: CRON_SECRET
        generateValue: true

databases:
  - name: taskpilot-db
    plan: free
    region: oregon
